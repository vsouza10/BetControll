<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>BetControll</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>💰 BetControll</h2>

    <ul>
      <li class="menu-item active" data-aba="dashboard">Dashboard</li>
      <li class="menu-item" data-aba="insights">
        Insights <span id="badgeInsights">(0)</span>
      </li>
    </ul>

    <!-- BOTÃO PRO -->
    <button class="btn-pro" onclick="ativarPro()">🔓 Ativar PRO</button>

  </aside>

  <!-- CONTEÚDO -->
  <main class="main">

    <!-- DASHBOARD -->
    <section id="dashboard" class="aba">

      <header>
        <h1>Dashboard</h1>
      </header>

      <!-- CARDS -->
      <section class="cards">

        <div class="card">
          <p>Saldo</p>
          <h2 id="saldo">R$ 0</h2>
        </div>

        <div class="card">
          <p>ROI</p>
          <h2 id="roi">0%</h2>
        </div>

        <div class="card">
          <p>Winrate</p>
          <h2 id="winrate">0%</h2>
        </div>

        <div class="card">
          <p>Score</p>
          <h2 id="score">0</h2>
          <small id="nivel">-</small>
        </div>

      </section>

      <!-- FORM -->
      <section class="form-box">

        <form id="formAposta">
          <input type="number" id="valor" placeholder="Valor (R$)" required>
          <input type="number" step="0.01" id="odd" placeholder="Odd" required>

          <select id="resultado">
            <option value="win">Win</option>
            <option value="loss">Loss</option>
          </select>

          <button type="submit">Adicionar</button>
        </form>

      </section>

      <!-- GRÁFICO -->
      <section class="grafico-box">
        <canvas id="grafico"></canvas>
      </section>

      <!-- TABELA -->
      <section class="tabela-box">

        <div class="tabela-header">
          <h2>📋 Histórico de Apostas</h2>

          <select id="filtroResultado">
            <option value="all">Todos</option>
            <option value="win">Wins</option>
            <option value="loss">Losses</option>
          </select>
        </div>

        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Valor</th>
              <th>Odd</th>
              <th>Resultado</th>
              <th>Lucro</th>
              <th>Ação</th>
            </tr>
          </thead>

          <tbody id="tabelaApostas">
            <!-- JS preenche -->
          </tbody>
        </table>

      </section>

      <!-- EXPORTAR -->
      <div style="margin-top: 20px;">
        <button onclick="exportarCSV()">📁 Exportar CSV</button>
      </div>

    </section>

    <!-- INSIGHTS -->
    <section id="insights" class="aba hidden">

      <header>
        <h1>📊 Insights Inteligentes</h1>
      </header>

      <div id="listaInsights">
        <!-- JS preenche -->
      </div>

    </section>

  </main>

</div>

<!-- SCRIPT -->
<script src="Js/script.js"></script>

</body>
</html>
